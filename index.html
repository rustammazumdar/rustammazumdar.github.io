<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rustam Mazumdar</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8e8e8;
    font-family:'Montserrat', sans-serif;
    height:100vh;
    overflow:hidden;
}

/* RIGHT SIDE */

.name{
    position:absolute;
    top:30px;
    right:30px;
    width:520px;
    text-align:left;
}

.tagline{
    font-size:1rem;
    font-weight:300;
    color:#333;
    margin-bottom:12px;
    line-height:1.4;
}

.main-name{
    font-size:2.125rem; /* 50% of previous 4.25rem */
    font-weight:500;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#111;
    margin-bottom:18px;
    line-height:1.05;
}

.location{
    font-size:0.9rem;
    font-weight:300;
    color:#555;
    margin-bottom:6px;
}

.contact,
.instagram{
    font-size:0.9rem;
    font-weight:300;
    color:#555;
    margin-bottom:4px;
}

.contact a,
.instagram a{
    color:#111;
    text-decoration:none;
}

.contact a:hover,
.instagram a:hover{
    text-decoration:underline;
}

/* LEFT SIDE */

.container{
    height:100vh;
    display:flex;
    align-items:center;
    padding-left:80px;
}

.panel-group{
    width:420px;
}

.panel{
    border-bottom:none;
}

.panel a{
    display:block;
    padding:20px 0;
    text-decoration:none;
    color:#111;
    opacity:0.4;
    transition:opacity 1.7s ease; /* ~20% slower than 1.4s */
}

.panel:hover a{
    opacity:1;
}

.panel h2{
    font-family:'Montserrat', sans-serif;
    font-size:2.2rem;
    font-weight:300;
    letter-spacing:0.03em;
    transition:all 1.7s ease;
}

.panel:hover h2{
    font-weight:500;
}

</style>
</head>

<body>

<div class="name">

    <div class="tagline">
        Experimental Non-Fiction Filmmaker
    </div>

    <div class="main-name">
        RUSTAM MAZUMDAR
    </div>

    <div class="location">
        New Delhi, India
    </div>

    <div class="tagline">
        Film Commentator
    </div>

    <div class="contact">
        Contact —
        <a href="mailto:rustam.mazumdar@gmail.com">
            rustam.mazumdar@gmail.com
        </a>
    </div>

    <div class="instagram">
        Instagram —
        <a href="https://www.instagram.com/rustammazumdar/" target="_blank">
            @rustammazumdar
        </a>
    </div>

</div>

<div class="container">

    <div class="panel-group">

        <div class="panel">
            <a href="writing.html">
                <h2>Writing</h2>
            </a>
        </div>

        <div class="panel">
            <a href="work.html">
                <h2>Work</h2>
            </a>
        </div>

        <div class="panel">
            <a href="resume.html">
                <h2>Resume</h2>
            </a>
        </div>

    </div>

</div>

</body>
</html>
