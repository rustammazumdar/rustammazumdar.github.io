<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e8e8e8;
    font-family:'Montserrat', sans-serif;
    height:100vh;
}

.name{
    position:absolute;
    top:50px;
    right:60px;
    font-size:1rem;
    letter-spacing:0.25em;
    text-transform:uppercase;
    color:#111;
}

.container{
    height:100vh;
    display:flex;
    align-items:center;
    padding-left:120px;
}

.panel-group{
    width:420px;
}

.panel{
    border-bottom:1px solid rgba(0,0,0,0.15);
}

.panel a{
    display:block;
    padding:28px 0;
    text-decoration:none;
    color:#111;
    transition:all .25s ease;
}

.panel a:hover{
    padding-left:12px;
}

.panel h2{
    font-size:2.2rem;
    font-weight:300;
}

</style>
</head>

<body>

<div class="name">RUSTAM MAZUMDAR</div>

<div class="container">

    <div class="panel-group">

        <div class="panel">
            <a href="writing.html">
                <h2>Writing</h2>
            </a>
        </div>

        <div class="panel">
            <a href="work.html">
                <h2>Work</h2>
            </a>
        </div>

        <div class="panel">

                <h2>Resume</h2>
            </a>
        </div>

    </div>

</div>

</body>
</html>
