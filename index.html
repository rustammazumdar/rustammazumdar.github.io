<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rustam Mazumdar</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#e8e8e8;font-family:'Montserrat',sans-serif;min-height:100vh;overflow-x:hidden;position:relative;}
#bg-video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:.08;filter:grayscale(100%) brightness(.9) contrast(1.05);z-index:-2;pointer-events:none;}
body::before{content:"";position:fixed;inset:0;background:rgba(232,232,232,.90);z-index:-1;pointer-events:none;}
.name{position:absolute;top:30px;right:30px;width:520px;text-align:left;}
.tagline{font-size:1rem;font-weight:300;color:#333;margin-bottom:12px;line-height:1.4;}
.main-name{font-size:2.125rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:#111;margin-bottom:18px;line-height:1.05;}
.location,.contact,.instagram{font-size:.9rem;font-weight:300;color:#555;margin-bottom:6px;}
.contact a,.instagram a{color:#111;text-decoration:none;}
.contact a:hover,.instagram a:hover{text-decoration:underline;}
.container{min-height:100vh;display:flex;align-items:center;padding-left:80px;}
.panel-group{width:520px;}
.panel a{display:block;padding:20px 0;text-decoration:none;color:#111;}
.panel h2{font-size:2rem;font-weight:300;letter-spacing:.03em;opacity:.4;transition:opacity .8s ease;}
.panel:hover h2{opacity:1;}
@media(max-width:768px){
body{padding:30px 25px;}
.name{position:static;width:100%;margin-bottom:60px;}
.main-name{font-size:1.8rem;letter-spacing:.18em;}
.tagline{font-size:.95rem;}
.location,.contact,.instagram{font-size:.85rem;}
.container{min-height:auto;display:block;padding-left:0;}
.panel-group{width:100%;}
.panel a{padding:16px 0;}
.panel h2{font-size:1.6rem;}
}
</style>
</head>
<body>
<video autoplay muted loop playsinline id="bg-video">
<source src="videos/background.mp4" type="video/mp4">
</video>
<div class="name">
<div class="tagline">Experimental Non-Fiction Filmmaker and Film Theorist</div>
<div class="main-name">RUSTAM MAZUMDAR</div>
<div class="location">New Delhi, India</div>
<div class="contact">Contact — <a href="mailto:rustam.mazumdar@gmail.com">rustam.mazumdar@gmail.com</a></div>
<div class="instagram">Instagram — <a href="https://www.instagram.com/rustammazumdar/" target="_blank">@rustammazumdar</a></div>
</div>
<div class="container">
<div class="panel-group">
<div class="panel"><a href="profile.html"><h2>Profile</h2></a></div>
<div class="panel"><a href="films.html"><h2>Films</h2></a></div>
<div class="panel"><a href="commentary.html"><h2>Commentary and Analysis</h2></a></div>
</div>
</div>
</body>
</html>
